<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#F8FAFC"/>
  <defs>
    <linearGradient id="ai_bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#ai_bg)"/>

  <!-- AI Chat Interface -->
  <rect x="260" y="140" width="900" height="800" rx="24" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <path d="M260 220H1160" stroke="#E2E8F0"/>
  <text x="300" y="185" font-family="sans-serif" font-weight="bold" font-size="24" fill="#1E293B">AI Career Coach</text>
  
  <!-- Chat Bubbles -->
  <rect x="300" y="260" width="500" height="80" rx="12" fill="#F1F5F9"/>
  <text x="320" y="305" font-family="sans-serif" font-size="16" fill="#475569">Hello! I've analyzed your resume for the Senior Go Engineer position.</text>
  
  <rect x="620" y="360" width="500" height="80" rx="12" fill="#6366F1"/>
  <text x="640" y="405" font-family="sans-serif" font-size="16" fill="white">Great, what's my match score and where can I improve?</text>

  <rect x="300" y="460" width="500" height="120" rx="12" fill="#F1F5F9"/>
  <text x="320" y="505" font-family="sans-serif" font-size="16" fill="#475569">
    <tspan x="320" dy="0">Your score is 92%. You should emphasize your experience</tspan>
    <tspan x="320" dy="25">with Kubernetes and high-concurrency patterns more</tspan>
    <tspan x="320" dy="25">to better align with the job description.</tspan>
  </text>

  <!-- Analysis Sidebar (Right) -->
  <rect x="1200" y="140" width="460" height="380" rx="24" fill="white" stroke="#6366F1" stroke-width="2"/>
  <text x="1230" y="190" font-family="sans-serif" font-weight="bold" font-size="20" fill="#1E293B">Resume Insights</text>
  
  <circle cx="1430" cy="320" r="70" stroke="#F1F5F9" stroke-width="12" fill="none"/>
  <path d="M1430 250 A70 70 0 1 1 1360 320" stroke="#6366F1" stroke-width="12" fill="none" stroke-linecap="round"/>
  <text x="1430" y="330" font-family="sans-serif" font-weight="900" font-size="32" fill="#1E293B" text-anchor="middle">92</text>
  <text x="1430" y="360" font-family="sans-serif" font-size="14" fill="#64748B" text-anchor="middle">MATCH SCORE</text>

  <!-- Interview Cards -->
  <rect x="1200" y="560" width="460" height="380" rx="24" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <text x="1230" y="610" font-family="sans-serif" font-weight="bold" font-size="20" fill="#1E293B">Predicted Questions</text>
  
  <rect x="1230" y="650" width="400" height="70" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="1250" y="690" font-family="sans-serif" font-size="14" fill="#475569">Explain the difference between Go channels and mutexes.</text>
  
  <rect x="1230" y="740" width="400" height="70" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="1250" y="780" font-family="sans-serif" font-size="14" fill="#475569">How do you manage state in a microservice architecture?</text>

  <!-- Title & Labels -->
  <text x="1160" y="1000" font-family="sans-serif" font-weight="900" font-size="64" fill="#1E293B" text-anchor="middle">ai-ace-job</text>
  <text x="1160" y="1040" font-family="sans-serif" font-size="24" fill="#6366F1" text-anchor="middle">AI-DRIVEN CAREER INTELLIGENCE</text>
</svg>