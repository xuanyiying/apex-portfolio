<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#F0F9FF"/>
  <defs>
    <linearGradient id="med_bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#F0F9FF"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#med_bg)"/>

  <!-- Left: Intelligent Chat Interface -->
  <rect x="150" y="140" width="850" height="800" rx="32" fill="white" stroke="#BAE6FD" stroke-width="2" />
  <rect x="150" y="140" width="850" height="80" rx="32" fill="#0EA5E9" />
  <rect x="150" y="180" width="850" height="40" fill="#0EA5E9" />
  <text x="200" y="195" font-family="sans-serif" font-weight="bold" font-size="28" fill="white">MedAI Assistant</text>
  <circle cx="780" cy="180" r="10" fill="#22C55E" />
  <text x="800" y="185" font-family="sans-serif" font-size="16" fill="white">Online</text>

  <!-- Chat Bubbles -->
  <rect x="200" y="260" width="550" height="100" rx="20" fill="#F1F5F9" />
  <text x="230" y="305" font-family="sans-serif" font-size="18" fill="#334155">
    <tspan x="230" dy="0">Hello! I am your AI medical consultant.</tspan>
    <tspan x="230" dy="28">How can I help you today?</tspan>
  </text>

  <rect x="400" y="400" width="550" height="100" rx="20" fill="#0EA5E9" />
  <text x="430" y="445" font-family="sans-serif" font-size="18" fill="white">
    <tspan x="430" dy="0">I've been feeling a sharp pain in my upper</tspan>
    <tspan x="430" dy="28">abdomen after meals. What should I do?</tspan>
  </text>

  <rect x="200" y="540" width="550" height="180" rx="20" fill="#F1F5F9" />
  <text x="230" y="585" font-family="sans-serif" font-size="18" fill="#334155">
    <tspan x="230" dy="0">Based on your description (Intelligent Triage),</tspan>
    <tspan x="230" dy="28">it could be related to your gallbladder or stomach.</tspan>
    <tspan x="230" dy="28">I recommend a consultation with a Gastroenterologist.</tspan>
    <tspan x="230" dy="28">Would you like to start a pre-diagnosis survey?</tspan>
  </text>

  <!-- Right Top: Pre-diagnosis Consultation -->
  <rect x="1050" y="140" width="720" height="380" rx="32" fill="white" stroke="#BAE6FD" stroke-width="2" />
  <text x="1100" y="200" font-family="sans-serif" font-weight="bold" font-size="24" fill="#0F172A">Pre-diagnosis Consultation</text>
  
  <rect x="1100" y="240" width="620" height="60" rx="12" fill="#F8FAFC" stroke="#E2E8F0" />
  <text x="1130" y="278" font-family="sans-serif" font-size="16" fill="#64748B">Q1: How long has the pain lasted?</text>
  <rect x="1600" y="255" width="30" height="30" rx="6" fill="#0EA5E9" />
  
  <rect x="1100" y="320" width="620" height="60" rx="12" fill="#F8FAFC" stroke="#E2E8F0" />
  <text x="1130" y="358" font-family="sans-serif" font-size="16" fill="#64748B">Q2: Any nausea or fever accompanying it?</text>
  
  <rect x="1100" y="400" width="620" height="60" rx="12" fill="#F8FAFC" stroke="#E2E8F0" />
  <text x="1130" y="438" font-family="sans-serif" font-size="16" fill="#64748B">Q3: Does the pain radiate to your back?</text>

  <!-- Right Bottom: Report Interpretation -->
  <rect x="1050" y="560" width="720" height="380" rx="32" fill="white" stroke="#0EA5E9" stroke-width="2" />
  <text x="1100" y="620" font-family="sans-serif" font-weight="bold" font-size="24" fill="#0F172A">Report Interpretation (AI-RAG)</text>
  
  <rect x="1100" y="660" width="200" height="240" rx="12" fill="#F1F5F9" stroke="#CBD5E1" />
  <rect x="1120" y="680" width="160" height="10" fill="#CBD5E1" />
  <rect x="1120" y="700" width="160" height="10" fill="#CBD5E1" />
  <rect x="1120" y="720" width="100" height="10" fill="#CBD5E1" />
  <text x="1150" y="800" font-family="sans-serif" font-weight="bold" font-size="12" fill="#64748B">BLOOD TEST</text>
  
  <line x1="1330" y1="780" x2="1400" y2="780" stroke="#0EA5E9" stroke-width="3" stroke-dasharray="5,5" />
  
  <rect x="1430" y="660" width="290" height="240" rx="12" fill="#F0F9FF" stroke="#0EA5E9" stroke-opacity="0.5" />
  <text x="1450" y="700" font-family="sans-serif" font-size="14" fill="#0369A1">
    <tspan x="1450" dy="0">AI Analysis:</tspan>
    <tspan x="1450" dy="25">Leukocyte count is slightly</tspan>
    <tspan x="1450" dy="25">elevated (11.2 x 10^9/L),</tspan>
    <tspan x="1450" dy="25">indicating mild inflammation.</tspan>
    <tspan x="1450" dy="25">Matches upper abdominal</tspan>
    <tspan x="1450" dy="25">pain symptoms.</tspan>
  </text>

  <!-- Title & Labels -->
  <text x="1770" y="1000" font-family="sans-serif" font-weight="900" font-size="64" fill="#0F172A" text-anchor="end">MedAI-Consultant</text>
  <text x="1770" y="1040" font-family="sans-serif" font-size="24" fill="#0EA5E9" text-anchor="end">AI-POWERED MEDICAL AUXILIARY DIAGNOSIS</text>
</svg>
